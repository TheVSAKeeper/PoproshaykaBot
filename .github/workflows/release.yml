name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - master

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      should_release: ${{ steps.decide.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -oP '(?<=<Version>).*(?=</Version>)' Directory.Build.props)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create tag if needed
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          if ! git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.VERSION }}" | grep -q .; then
            git tag "v${{ steps.version.outputs.VERSION }}"
            git push origin "v${{ steps.version.outputs.VERSION }}"
          fi

      - name: Decide if release is needed
        id: decide
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif ! gh release view "v${{ steps.version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [ x64, x86 ]
    defaults:
      run:
        working-directory: ./PoproshaykaBot.WinForms

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Publish framework-dependent
        run: >
          dotnet publish
          --configuration Release
          --runtime win-${{ matrix.arch }}
          --output .\publish\framework-dependent
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true
          -p:Version=${{ needs.prepare.outputs.version }}
          --no-self-contained

      - name: Publish portable
        run: >
          dotnet publish
          --configuration Release
          --runtime win-${{ matrix.arch }}
          --output .\publish\portable
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PortableMode=true
          -p:Version=${{ needs.prepare.outputs.version }}
          --self-contained

      - name: Package artifacts
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $arch = "${{ matrix.arch }}"
          New-Item -ItemType Directory -Path ".\artifacts" -Force | Out-Null
          Rename-Item -Path ".\publish\framework-dependent\PoproshaykaBot.WinForms.exe" -NewName "PoproshaykaBot-v$version-$arch.exe"
          Rename-Item -Path ".\publish\portable\PoproshaykaBot.WinForms.exe" -NewName "PoproshaykaBot-v$version-$arch-portable.exe"
          Move-Item -Path ".\publish\framework-dependent\PoproshaykaBot-v$version-$arch.exe" -Destination ".\artifacts\"
          Move-Item -Path ".\publish\portable\PoproshaykaBot-v$version-$arch-portable.exe" -Destination ".\artifacts\"
          Compress-Archive -Path ".\artifacts\PoproshaykaBot-v$version-$arch.exe" -DestinationPath ".\artifacts\PoproshaykaBot-v$version-$arch.zip"
          Compress-Archive -Path ".\artifacts\PoproshaykaBot-v$version-$arch-portable.exe" -DestinationPath ".\artifacts\PoproshaykaBot-v$version-$arch-portable.zip"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: PoproshaykaBot.WinForms/artifacts/*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [ prepare, build ]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: PoproshaykaBot v${{ needs.prepare.outputs.version }}
          files: artifacts/*
          generate_release_notes: true
